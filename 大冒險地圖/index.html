<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>大冒險地圖</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');

    :root {
      --bg: #07050f;
      --panel: #11102a;
      --panel2: #1a1840;
      --gold: #facc15;
      --gold2: #fef08a;
      --purple: #7c3aed;
      --purple2: #a78bfa;
      --green: #10b981;
      --green2: #34d399;
      --red: #ef4444;
      --text: #f8fafc;
      --muted: #94a3b8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      margin: 0;
      font-family: 'Outfit', 'Noto Sans TC', system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
    }

    button { font: inherit; border: 0; cursor: pointer; }

    /* ── Cover Screen ── */
    #coverScreen {
      position: fixed;
      inset: 0;
      background-image: url('cover.png');
      background-size: cover;
      background-position: center;
      z-index: 300;
      cursor: pointer;
      transition: opacity 0.6s ease;
    }
    #coverScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ── Top Right Info ── */
    .top-info {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(17, 16, 42, 0.85);
      backdrop-filter: blur(8px);
      padding: 12px 20px;
      border-radius: 16px;
      border: 2px solid rgba(124, 58, 237, 0.4);
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .cert-count {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--muted);
    }
    .cert-count span {
      color: var(--gold);
      font-size: 1.4rem;
      font-weight: 900;
    }

    .btn-clear {
      padding: 8px 16px;
      border-radius: 10px;
      border: 2px solid rgba(239,68,68,.4);
      background: rgba(239,68,68,.1);
      color: #fca5a5;
      font-weight: 700;
      font-size: .95rem;
      transition: all .15s ease;
    }
    .btn-clear:hover {
      background: rgba(239,68,68,.25);
      border-color: var(--red);
      color: #fff;
    }

    /* ── Map Container ── */
    .map-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    .map-inner {
      position: relative;
      display: inline-block;
    }

    .map-inner img {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    /* ── Hot Zones ── */
    .hotzone {
      position: absolute;
      cursor: pointer;
      border-radius: 12px;
      background: transparent;
      transition: box-shadow 0.2s, background 0.2s;
    }
    .hotzone:hover {
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 20px 8px rgba(255, 255, 255, 0.3);
    }
    .hotzone.done::after {
      content: '✓';
      position: absolute;
      top: -15px;
      right: -15px;
      background: var(--green);
      color: white;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 22px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.4);
      z-index: 10;
    }

    /* ── Overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 16px;
      z-index: 200;
      background: rgba(4,3,12,.85);
      backdrop-filter: blur(10px);
    }
    .overlay.show { display: grid; }

    /* ── Gate modal ── */
    .gate-modal {
      width: min(100%, 640px);
      border: 4px solid rgba(250,204,21,.5);
      border-radius: 24px;
      background: linear-gradient(160deg, #1a1840 0%, #0f0c24 100%);
      box-shadow: 0 30px 80px rgba(0,0,0,.9), 0 0 40px rgba(250,204,21,.1);
      padding: 32px 28px;
      text-align: center;
    }
    .gate-modal h2 {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .gate-modal .gate-hint {
      font-size: .95rem;
      color: var(--muted);
      margin-bottom: 28px;
      font-weight: 600;
    }

    /* Slots */
    .slots {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 10px;
      border: 3px dashed rgba(250,204,21,.35);
      border-radius: 16px;
      background: rgba(250,204,21,.04);
      min-height: 120px;
      justify-content: center;
      transition: background .2s, border-color .2s;
    }
    .slot.drag-over {
      border-color: var(--gold);
      background: rgba(250,204,21,.12);
    }
    .slot.slot-wrong {
      animation: slotWrong .4s ease-in-out;
    }
    .slot.slot-filled {
      border-style: solid;
      border-color: var(--green);
      background: rgba(16,185,129,.08);
    }
    .slot-label {
      font-size: .8rem;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .slot-content {
      font-size: 2.4rem;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slot-name {
      font-size: .85rem;
      font-weight: 700;
      color: var(--muted);
    }
    .slot.slot-filled .slot-name {
      color: var(--green2);
    }

    /* Divider */
    .modal-divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(124,58,237,.4), transparent);
      margin-bottom: 24px;
    }

    /* Bag */
    .bag-title {
      font-size: 1rem;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 14px;
      text-align: left;
    }
    .bag-items {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      min-height: 70px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 16px;
      border: 2.5px solid rgba(250,204,21,.5);
      border-radius: 14px;
      background: rgba(250,204,21,.08);
      cursor: grab;
      transition: transform .15s, box-shadow .15s;
      user-select: none;
      touch-action: none;
    }
    .badge:active { cursor: grabbing; }
    .badge.used {
      opacity: .3;
      cursor: default;
      pointer-events: none;
    }
    .badge-emoji { font-size: 2rem; }
    .badge-name { font-size: .75rem; font-weight: 800; color: var(--gold2); }
    .empty-bag {
      color: var(--muted);
      font-size: .95rem;
      font-weight: 600;
      align-self: center;
      width: 100%;
      text-align: center;
      padding: 16px 0;
    }

    .btn-close-gate {
      padding: 10px 24px;
      border-radius: 10px;
      background: rgba(148,163,184,.1);
      border: 2px solid rgba(148,163,184,.25);
      color: var(--muted);
      font-weight: 700;
      font-size: .95rem;
      transition: all .15s;
    }
    .btn-close-gate:hover {
      background: rgba(148,163,184,.2);
      color: #fff;
    }

    /* ── Victory panel ── */
    .victory-panel {
      width: min(100%, 520px);
      border: 4px solid var(--green);
      border-radius: 24px;
      background: linear-gradient(160deg, #071e14 0%, #040e0a 100%);
      box-shadow: 0 30px 80px rgba(0,0,0,.9), 0 0 50px rgba(16,185,129,.25);
      padding: 40px 28px;
      text-align: center;
    }
    .victory-panel h2 {
      font-size: 2.4rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--gold2) 0%, var(--green2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    .victory-time {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--gold);
      margin: 20px 0;
    }
    .victory-time small {
      display: block;
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .victory-badges {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 24px 0;
    }
    .victory-badge {
      font-size: 3rem;
      animation: victoryBounce 1s ease-in-out infinite alternate;
    }
    .victory-badge:nth-child(2) { animation-delay: .2s; }
    .victory-badge:nth-child(3) { animation-delay: .4s; }

    .btn-replay {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--green) 0%, #047857 100%);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 900;
      border: 3px solid #064e3b;
      box-shadow: 0 6px 0 #064e3b;
      transition: all .12s ease;
    }
    .btn-replay:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 0 #064e3b, 0 12px 20px rgba(16,185,129,.3);
    }
    .btn-replay:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #064e3b;
    }

    /* ── Animations ── */
    @keyframes slotWrong {
      0%, 100% { transform: translateX(0); border-color: rgba(250,204,21,.35); background: rgba(250,204,21,.04); }
      20%, 60% { transform: translateX(-8px); border-color: var(--red); background: rgba(239,68,68,.1); }
      40%, 80% { transform: translateX(8px); border-color: var(--red); background: rgba(239,68,68,.1); }
    }
    @keyframes victoryBounce {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-12px) scale(1.08); }
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .slots { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Cover Screen -->
<div id="coverScreen"></div>

<!-- Top Right Info -->
<div class="top-info">
  <div class="cert-count">持有 <span id="certCount">0</span> / 3</div>
  <button class="btn-clear" id="btnClear">🔄 清除進度</button>
</div>

<!-- Map Container -->
<div class="map-wrapper">
  <div class="map-inner">
    <img src="map-bg.png" alt="Map Background">
    
    <!-- 預估熱區位置：後續可由使用者提供微調指令調整 -->
    <div class="hotzone" id="hzQuest1" style="top: 20%; left: 15%; width: 20%; height: 15%;" onclick="location.href='../示範1_朝代配對/index.html'"></div>
    <div class="hotzone" id="hzQuest2" style="top: 20%; left: 65%; width: 20%; height: 15%;" onclick="location.href='../示範2_成語填字/index.html'"></div>
    <div class="hotzone" id="hzQuest3" style="top: 65%; left: 15%; width: 20%; height: 15%;" onclick="location.href='../示範3_打怪RPG/index.html'"></div>
    <div class="hotzone" id="hzGate" style="top: 45%; left: 40%; width: 20%; height: 20%;"></div>
  </div>
</div>

<!-- Gate Modal Overlay -->
<div class="overlay" id="gateOverlay">
  <div class="gate-modal" id="gateModal">
    <h2>🚪 通關大門</h2>
    <p class="gate-hint">將背包中的憑證拖到對應的凹槽，3 個都對才能開門！</p>

    <!-- Slots -->
    <div class="slots">
      <div class="slot" id="slotDynasty" data-slot="dynasty">
        <div class="slot-label">朝代</div>
        <div class="slot-content" id="slotDynastyContent">🔳</div>
        <div class="slot-name" id="slotDynastyName">拖入此處</div>
      </div>
      <div class="slot" id="slotIdiom" data-slot="idiom">
        <div class="slot-label">成語</div>
        <div class="slot-content" id="slotIdiomContent">🔳</div>
        <div class="slot-name" id="slotIdiomName">拖入此處</div>
      </div>
      <div class="slot" id="slotWarrior" data-slot="warrior">
        <div class="slot-label">勇者</div>
        <div class="slot-content" id="slotWarriorContent">🔳</div>
        <div class="slot-name" id="slotWarriorName">拖入此處</div>
      </div>
    </div>

    <div class="modal-divider"></div>

    <!-- Bag -->
    <div class="bag-title">🎒 憑證背包</div>
    <div class="bag-items" id="bagItems"></div>

    <button class="btn-close-gate" id="btnCloseGate">關閉</button>
  </div>
</div>

<!-- Victory overlay -->
<div class="overlay" id="victoryOverlay">
  <div class="victory-panel">
    <div class="victory-badges">
      <div class="victory-badge">🎴</div>
      <div class="victory-badge">📝</div>
      <div class="victory-badge">⚔️</div>
    </div>
    <h2>🏆 冒險完成！</h2>
    <div class="victory-time">
      <small>總冒險時長</small>
      <span id="totalTime">-- 分 -- 秒</span>
    </div>
    <p style="color:var(--muted); font-weight:600; margin-bottom:24px;">恭喜完成所有關卡！你是最強的國學冒險家！</p>
    <button class="btn-replay" id="btnReplay">🔄 再次冒險</button>
  </div>
</div>

<!-- Ending Animation Overlay -->
<div class="overlay" id="endingOverlay" style="background: #000; z-index: 400; padding: 0;">
  <div style="position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer;" id="endingContainer">
    <img id="endingImg" src="結局圖1.png" style="width: 100%; height: 100%; object-fit: contain; transition: opacity 0.5s;">
    <div style="position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%); width: 80%; max-width: 800px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); padding: 40px 20px 20px; text-align: center; border-radius: 12px;">
      <h3 style="color: var(--gold); font-size: 1.8rem; margin-bottom: 12px; font-weight: 900; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">《千古迴響，卷軸重光》</h3>
      <p id="endingText" style="color: #fff; font-size: 1.2rem; font-weight: 700; line-height: 1.6; text-shadow: 0 2px 4px rgba(0,0,0,0.8);"></p>
    </div>
  </div>
</div>

<script>
  const CERTS = [
    { key: 'cert_dynasty', slot: 'dynasty', emoji: '📜', name: '朝代之印' },
    { key: 'cert_idiom',   slot: 'idiom',   emoji: '✍️', name: '成語之印' },
    { key: 'cert_warrior', slot: 'warrior',  emoji: '🏅', name: '勇者之印' }
  ];

  // ── Cover Screen Logic ──
  const coverScreen = document.getElementById('coverScreen');
  if (!sessionStorage.getItem('cover_seen')) {
    coverScreen.addEventListener('click', () => {
      coverScreen.classList.add('hidden');
      sessionStorage.setItem('cover_seen', '1');
    });
  } else {
    coverScreen.style.display = 'none';
  }

  // ── Init adventure timer ──
  if (!localStorage.getItem('adventure_start')) {
    localStorage.setItem('adventure_start', Date.now().toString());
  }

  // ── DOM refs ──
  const hzQuest1 = document.getElementById('hzQuest1');
  const hzQuest2 = document.getElementById('hzQuest2');
  const hzQuest3 = document.getElementById('hzQuest3');
  const hzGate = document.getElementById('hzGate');

  const certCount = document.getElementById('certCount');
  const btnClear = document.getElementById('btnClear');
  
  const gateOverlay = document.getElementById('gateOverlay');
  const btnCloseGate = document.getElementById('btnCloseGate');
  const bagItems = document.getElementById('bagItems');
  
  const victoryOverlay = document.getElementById('victoryOverlay');
  const totalTimeEl = document.getElementById('totalTime');
  const btnReplay = document.getElementById('btnReplay');

  const SLOT_ELS = {
    dynasty: { slot: document.getElementById('slotDynasty'), content: document.getElementById('slotDynastyContent'), name: document.getElementById('slotDynastyName') },
    idiom:   { slot: document.getElementById('slotIdiom'),   content: document.getElementById('slotIdiomContent'),   name: document.getElementById('slotIdiomName') },
    warrior: { slot: document.getElementById('slotWarrior'), content: document.getElementById('slotWarriorContent'), name: document.getElementById('slotWarriorName') }
  };

  let slotFilled = { dynasty: false, idiom: false, warrior: false };

  // ── Render page ──
  function render() {
    let count = 0;
    const STATUS_MAP = [
      { hz: hzQuest1, certKey: 'cert_dynasty' },
      { hz: hzQuest2, certKey: 'cert_idiom' },
      { hz: hzQuest3, certKey: 'cert_warrior' }
    ];
    STATUS_MAP.forEach(({ hz, certKey }) => {
      const done = !!localStorage.getItem(certKey);
      if (done) {
        hz.classList.add('done');
        count++;
      } else {
        hz.classList.remove('done');
      }
    });
    certCount.textContent = count;
  }

  // ── Clear progress ──
  btnClear.addEventListener('click', () => {
    if (!confirm('確定要清除所有進度嗎？這會清除 3 個遊戲的完成記錄和冒險計時。')) return;
    ['cert_dynasty','cert_idiom','cert_warrior','adventure_start'].forEach(k => localStorage.removeItem(k));
    sessionStorage.removeItem('cover_seen');
    localStorage.setItem('adventure_start', Date.now().toString());
    location.reload(); // Reload to show cover again
  });

  // ── Open Gate ──
  hzGate.addEventListener('click', () => {
    slotFilled = { dynasty: false, idiom: false, warrior: false };
    resetSlots();
    renderBag();
    gateOverlay.classList.add('show');
  });

  btnCloseGate.addEventListener('click', () => gateOverlay.classList.remove('show'));

  function resetSlots() {
    Object.entries(SLOT_ELS).forEach(([key, els]) => {
      els.slot.className = 'slot';
      els.content.textContent = '🔳';
      els.name.textContent = '拖入此處';
      els.name.style.color = '';
    });
  }

  // ── Render bag ──
  function renderBag() {
    bagItems.innerHTML = '';
    const owned = CERTS.filter(c => localStorage.getItem(c.key));

    if (owned.length === 0) {
      bagItems.innerHTML = '<div class="empty-bag">尚未取得任何憑證，請先完成關卡！</div>';
      return;
    }

    owned.forEach(cert => {
      const badge = document.createElement('div');
      badge.className = 'badge';
      badge.dataset.certKey = cert.key;
      badge.dataset.certSlot = cert.slot;
      badge.innerHTML = `<span class="badge-emoji">${cert.emoji}</span><span class="badge-name">${cert.name}</span>`;

      if (slotFilled[cert.slot]) {
        badge.classList.add('used');
      }

      // Mouse drag
      badge.addEventListener('mousedown', startMouseDrag);
      // Touch drag
      badge.addEventListener('touchstart', startTouchDrag, { passive: false });

      bagItems.appendChild(badge);
    });
  }

  // ── Drag & Drop: Mouse ──
  let draggingBadge = null;
  let dragOriginX = 0, dragOriginY = 0;
  let dragOffsetX = 0, dragOffsetY = 0;
  let ghostEl = null;

  function startMouseDrag(e) {
    if (e.button !== 0) return;
    const badge = e.currentTarget;
    if (badge.classList.contains('used')) return;
    e.preventDefault();
    draggingBadge = badge;
    const rect = badge.getBoundingClientRect();
    dragOffsetX = e.clientX - rect.left;
    dragOffsetY = e.clientY - rect.top;
    createGhost(badge, rect.left, rect.top, rect.width, rect.height);
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
  }

  function onMouseMove(e) {
    if (!ghostEl) return;
    ghostEl.style.left = (e.clientX - dragOffsetX) + 'px';
    ghostEl.style.top = (e.clientY - dragOffsetY) + 'px';
    highlightSlot(e.clientX, e.clientY);
  }

  function onMouseUp(e) {
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
    dropOnSlot(e.clientX, e.clientY);
    clearGhost();
    clearSlotHighlight();
  }

  // ── Drag & Drop: Touch ──
  let touchId = null;

  function startTouchDrag(e) {
    const badge = e.currentTarget;
    if (badge.classList.contains('used')) return;
    e.preventDefault();
    const touch = e.changedTouches[0];
    touchId = touch.identifier;
    draggingBadge = badge;
    const rect = badge.getBoundingClientRect();
    dragOffsetX = touch.clientX - rect.left;
    dragOffsetY = touch.clientY - rect.top;
    createGhost(badge, rect.left, rect.top, rect.width, rect.height);
    document.addEventListener('touchmove', onTouchMove, { passive: false });
    document.addEventListener('touchend', onTouchEnd);
    document.addEventListener('touchcancel', onTouchEnd);
  }

  function onTouchMove(e) {
    const touch = [...e.changedTouches].find(t => t.identifier === touchId);
    if (!touch || !ghostEl) return;
    e.preventDefault();
    ghostEl.style.left = (touch.clientX - dragOffsetX) + 'px';
    ghostEl.style.top = (touch.clientY - dragOffsetY) + 'px';
    highlightSlot(touch.clientX, touch.clientY);
  }

  function onTouchEnd(e) {
    const touch = [...e.changedTouches].find(t => t.identifier === touchId);
    document.removeEventListener('touchmove', onTouchMove);
    document.removeEventListener('touchend', onTouchEnd);
    document.removeEventListener('touchcancel', onTouchEnd);
    if (touch) dropOnSlot(touch.clientX, touch.clientY);
    clearGhost();
    clearSlotHighlight();
    touchId = null;
  }

  // ── Ghost element ──
  function createGhost(badge, left, top, w, h) {
    ghostEl = badge.cloneNode(true);
    ghostEl.style.cssText = `
      position:fixed; left:${left}px; top:${top}px;
      width:${w}px; height:${h}px;
      pointer-events:none; z-index:9999;
      opacity:.9; transform:scale(1.08);
      box-shadow:0 12px 28px rgba(0,0,0,.5);
      border:2.5px solid var(--gold); border-radius:14px;
      background:rgba(250,204,21,.12);
      display:flex; flex-direction:column; align-items:center;
      gap:4px; padding:10px 16px;
    `;
    document.body.appendChild(ghostEl);
  }

  function clearGhost() {
    if (ghostEl) { ghostEl.remove(); ghostEl = null; }
    draggingBadge = null;
  }

  // ── Slot highlight ──
  function highlightSlot(cx, cy) {
    Object.values(SLOT_ELS).forEach(({ slot }) => slot.classList.remove('drag-over'));
    const target = getSlotAt(cx, cy);
    if (target) target.slot.classList.add('drag-over');
  }

  function clearSlotHighlight() {
    Object.values(SLOT_ELS).forEach(({ slot }) => slot.classList.remove('drag-over'));
  }

  function getSlotAt(cx, cy) {
    for (const [key, els] of Object.entries(SLOT_ELS)) {
      const rect = els.slot.getBoundingClientRect();
      if (cx >= rect.left && cx <= rect.right && cy >= rect.top && cy <= rect.bottom) {
        return { key, ...els };
      }
    }
    return null;
  }

  // ── Drop logic ──
  function dropOnSlot(cx, cy) {
    if (!draggingBadge) return;
    const target = getSlotAt(cx, cy);
    if (!target) return;

    const certSlot = draggingBadge.dataset.certSlot;
    const cert = CERTS.find(c => c.key === draggingBadge.dataset.certKey);
    if (!cert) return;

    if (certSlot === target.key && !slotFilled[target.key]) {
      // Correct!
      slotFilled[target.key] = true;
      target.slot.classList.add('slot-filled');
      target.content.textContent = cert.emoji;
      target.name.textContent = cert.name;
      target.name.style.color = 'var(--green2)';
      renderBag();
      checkVictory();
    } else {
      // Wrong!
      target.slot.classList.remove('slot-wrong');
      void target.slot.offsetWidth;
      target.slot.classList.add('slot-wrong');
      setTimeout(() => target.slot.classList.remove('slot-wrong'), 450);
    }
  }

  // ── Check all filled ──
  function checkVictory() {
    if (slotFilled.dynasty && slotFilled.idiom && slotFilled.warrior) {
      setTimeout(() => {
        gateOverlay.classList.remove('show');
        startEnding();
      }, 600);
    }
  }

  // ── Ending Animation Logic ──
  const ENDING_SCENES = [
    { img: '結局圖1.png', text: '三印共鳴，沉寂千年的星門終於敞開……' },
    { img: '結局圖2.png', text: '文字不再是枯木，它們化作金色的星辰，重新點亮了整座大陸。' },
    { img: '結局圖3.png', text: '這不是結束。只要有人翻開書頁，這場冒險便會繼續。' },
    { img: '結局圖4.png', text: '你已將傳承刻印於心。去吧，去書寫你自己的篇章。' }
  ];
  let currentEndingIndex = 0;
  
  const endingOverlay = document.getElementById('endingOverlay');
  const endingImg = document.getElementById('endingImg');
  const endingText = document.getElementById('endingText');

  function startEnding() {
    currentEndingIndex = 0;
    showEndingScene(0);
    endingOverlay.classList.add('show');
  }

  function showEndingScene(index) {
    endingImg.style.opacity = 0;
    setTimeout(() => {
      endingImg.src = ENDING_SCENES[index].img;
      endingText.textContent = ENDING_SCENES[index].text;
      endingImg.style.opacity = 1;
    }, 300);
  }

  document.getElementById('endingContainer').addEventListener('click', () => {
    currentEndingIndex++;
    if (currentEndingIndex < ENDING_SCENES.length) {
      showEndingScene(currentEndingIndex);
    } else {
      endingOverlay.classList.remove('show');
      showVictory();
    }
  });

  function showVictory() {
    const start = parseInt(localStorage.getItem('adventure_start') || '0', 10);
    const elapsed = Math.floor((Date.now() - start) / 1000);
    const mm = Math.floor(elapsed / 60).toString().padStart(2, '0');
    const ss = (elapsed % 60).toString().padStart(2, '0');
    totalTimeEl.textContent = `${mm} 分 ${ss} 秒`;
    victoryOverlay.classList.add('show');
  }

  // ── Replay ──
  btnReplay.addEventListener('click', () => {
    ['cert_dynasty','cert_idiom','cert_warrior','adventure_start'].forEach(k => localStorage.removeItem(k));
    sessionStorage.removeItem('cover_seen');
    localStorage.setItem('adventure_start', Date.now().toString());
    location.reload(); // Reload to restart adventure and show cover
  });

  // ── Initial render ──
  render();
</script>
</body>
</html>
